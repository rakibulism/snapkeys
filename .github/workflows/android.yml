name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: snapkeys-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk snapkeys.apk
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "Latest build" \
              --notes "Rolling release — always the newest APK built from main."
          gh release upload latest snapkeys.apk --clobber
